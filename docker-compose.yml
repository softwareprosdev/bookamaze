services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookamaze
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bookamaze
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  app:
    image: node:22-bullseye-slim
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@10.33.0 --activate && pnpm install && pnpm dev"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://bookamaze:password@db:5432/bookamaze
      VITE_APP_URL: http://localhost:3000
      NODE_ENV: development
      CI: "true"
    ports:
      - '3000:3000'
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  db_data:
