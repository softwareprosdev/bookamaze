version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookamaze
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bookamaze
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  app:
    build: .
    command: node .output/server/index.mjs
    working_dir: /app
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://bookamaze:password@db:5432/bookamaze
      VITE_APP_URL: http://localhost:3000
      NODE_ENV: production
    ports:
      - '3000:3000'
    volumes:
      - .:/app:cached
      - app_node_modules:/app/node_modules
    depends_on:
      - db

volumes:
  db_data:
  app_node_modules:
