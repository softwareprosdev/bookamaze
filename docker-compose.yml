services:
  app:
    image: node:22-bullseye-slim
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@10.33.0 --activate && pnpm install && pnpm dev"
    env_file:
      - .env.local
    environment:
      DATABASE_PATH: /app/data/bookamaze.db
      VITE_APP_URL: http://localhost:3000
      NODE_ENV: development
      CI: "true"
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_data:/app/data

volumes:
  app_node_modules:
  app_data:
